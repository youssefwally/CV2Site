<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Professional Profile</title>
<meta name="description" content="A data-driven professional profile generated from a LaTeX CV.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,300;1,400&family=Jost:wght@300;400;500&family=JetBrains+Mono:wght@300;400&display=swap" rel="stylesheet">
<link rel="stylesheet" href="assets/css/styles.css">
</head>
<body>

<nav>
  <a href="#hero" class="nav-logo" id="brandText">Profile</a>
  <ul class="nav-links" id="navList"></ul>
</nav>

<section id="hero">
  <canvas id="microCanvas"></canvas>
  <div class="hero-grid">
    <div class="hero-text fade-in">
      <div class="hero-eyebrow" id="heroEyebrow"></div>
      <h1 id="heroName"></h1>
      <p class="hero-title" id="heroTitle"></p>
      <p class="hero-desc" id="heroSummary"></p>
      <div class="hero-links" id="heroActions"></div>
    </div>
  </div>
</section>

<section id="about">
  <div class="container">
    <div class="section-header fade-in">
      <span class="section-num">01</span>
      <h2>About</h2>
      <div class="section-line"></div>
    </div>
    <div class="about-grid">
      <div class="about-text fade-in">
        <div id="aboutCopy"></div>
        <div class="skills-block">
          <div class="skills-label">Technical Skills</div>
          <div class="skills-list" id="skillsList"></div>
        </div>
      </div>
      <div class="fade-in" style="transition-delay:0.15s">
        <div class="info-card" id="quickFacts"></div>
      </div>
    </div>
  </div>
</section>

<section id="research">
  <div class="container">
    <div class="section-header fade-in">
      <span class="section-num">02</span>
      <h2>Research</h2>
      <div class="section-line"></div>
    </div>
    <div class="research-grid" id="researchGrid"></div>
  </div>
</section>

<section id="publications">
  <div class="container">
    <div class="section-header fade-in">
      <span class="section-num">03</span>
      <h2>Publications</h2>
      <div class="section-line"></div>
    </div>
    <div class="pub-list" id="publicationList"></div>
  </div>
</section>

<section id="presentations">
  <div class="container">
    <div class="section-header fade-in">
      <span class="section-num">04</span>
      <h2>Talks and Presentations</h2>
      <div class="section-line"></div>
    </div>
    <div class="pub-list" id="presentationList"></div>
  </div>
</section>

<section id="experience">
  <div class="container">
    <div class="section-header fade-in">
      <span class="section-num">05</span>
      <h2>Experience</h2>
      <div class="section-line"></div>
    </div>
    <div class="timeline fade-in" id="experienceTimeline"></div>
  </div>
</section>

<section id="education">
  <div class="container">
    <div class="section-header fade-in">
      <span class="section-num">06</span>
      <h2>Education</h2>
      <div class="section-line"></div>
    </div>
    <div class="edu-grid" id="educationGrid"></div>
  </div>
</section>

<section id="service">
  <div class="container">
    <div class="section-header fade-in">
      <span class="section-num">07</span>
      <h2>Appointments and Outreach</h2>
      <div class="section-line"></div>
    </div>
    <div class="research-grid" id="serviceGrid"></div>
  </div>
</section>

<section id="contact">
  <div class="container">
    <div class="section-header fade-in">
      <span class="section-num">08</span>
      <h2>Contact</h2>
      <div class="section-line"></div>
    </div>
    <div class="contact-grid">
      <div class="contact-text fade-in">
        <h3 id="contactTitle"></h3>
        <p id="contactIntro"></p>
        <a href="#" id="contactEmail" class="btn"></a>
      </div>
      <div class="social-links fade-in" style="transition-delay:0.15s" id="contactLinks"></div>
    </div>
  </div>
</section>

<footer>
  <span><span id="footerYear"></span> <span id="footerName"></span></span>
  <span id="codeSource"> Template Source: <a href="https://github.com/youssefwally/CV2Site" target="_blank">GitHub</a> </span>
  <span id="footerMeta"></span>
</footer>

<script src="assets/js/site-data.js"></script>
<script src="assets/js/main.js"></script>
</body>
</html>
